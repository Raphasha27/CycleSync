name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: HTML Validator
      run: |
        # Use a simple HTML validator or just check for basic syntax
        grep -q "<!DOCTYPE html>" index.html
